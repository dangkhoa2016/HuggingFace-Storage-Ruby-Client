name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run tests
        run: bin/rspec
      - name: Run RuboCop
        run: bundle exec rubocop --parallel
      - name: Validate RBS
        run: bundle exec rbs validate
      - name: Build gem
        run: gem build hugging_face_storage.gemspec
      - name: Push to RubyGems
        if: ${{ secrets.RUBYGEMS_API_KEY }}
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push hugging_face_storage-*.gem
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "hugging_face_storage-*.gem"
          generate_release_notes: true
