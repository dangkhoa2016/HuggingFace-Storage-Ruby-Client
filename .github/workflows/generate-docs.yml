name: Generate YARD Documentation

on:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.7.8"
          bundler-cache: true
      - name: Generate YARD documentation
        run: bundle exec yard doc --no-cache 2>&1 | tail -5
        continue-on-error: true
