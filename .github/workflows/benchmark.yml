name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday 6am

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run benchmarks
        run: bundle exec rake benchmark:all
